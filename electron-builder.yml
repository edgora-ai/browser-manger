appId: com.ahoo.cloak-lite
productName: CloakLite
copyright: Copyright © 2026

icon: dist/resources/icon.icns

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [arm64]
  artifactName: CloakLite-${version}-mac-${arch}.${ext}
  icon: dist/resources/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: CloakLite-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

directories:
  output: release

files:
  - package.json
  - dist/main/**/*
  - dist/renderer/**/*
  - dist/resources/**/*

asar: true
compression: maximum
